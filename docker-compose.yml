x-python-build: &python-build
  context: .
  dockerfile: Dockerfile

x-python-image: &python-image personal_finance_python:dev

services:
  db:
    image: mysql:8.4
    container_name: personal_finance_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: Personal_Finance
      MYSQL_INITDB_SKIP_TZINFO: 1
    ports:
      - "${MYSQL_LOCAL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: personal_finance_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_APP_USER:-pf_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      MYSQL_DATABASE: Personal_Finance
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}

      AUTH_DEV_MODE: ${AUTH_DEV_MODE:-false}
      AUTH_LOG_OTP_IN_DEV: ${AUTH_LOG_OTP_IN_DEV:-true}
      AUTH_OTP_DELIVERY_MODE: ${AUTH_OTP_DELIVERY_MODE:-DEV_LOG_ONLY}
      AUTH_OTP_REQUIRE_DELIVERY_SUCCESS: ${AUTH_OTP_REQUIRE_DELIVERY_SUCCESS:-false}
      AUTH_OTP_COOLDOWN_SECONDS: ${AUTH_OTP_COOLDOWN_SECONDS:-10}
    ports:
      - "${BACKEND_LOCAL_PORT:-8000}:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: personal_finance_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_LOCAL_PORT:-3000}:3000"

  db-reset:
    build: *python-build
    image: *python-image
    profiles: ["setup"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: Personal_Finance
    volumes:
      - ./database:/app/database:ro
      - ./ops:/app/ops:ro
    command: ["sh", "ops/docker/reset_database.sh"]

  db-apply-views:
    build: *python-build
    image: *python-image
    profiles: ["setup"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: Personal_Finance
    volumes:
      - ./database:/app/database:ro
      - ./ops:/app/ops:ro
    command: ["sh", "ops/docker/apply_views.sh"]

  bootstrap-admin:
    build: *python-build
    image: *python-image
    profiles: ["setup"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_APP_USER:-pf_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      MYSQL_DATABASE: Personal_Finance
      PF_ADMIN_EMAIL: ${PF_ADMIN_EMAIL}
      PF_ADMIN_PASSWORD: ${PF_ADMIN_PASSWORD}
      PF_ADMIN_NAME: ${PF_ADMIN_NAME:-System Admin}
      PF_ADMIN_PHONE: ${PF_ADMIN_PHONE:-}
      PF_ADMIN_RECOVERY_HINT: ${PF_ADMIN_RECOVERY_HINT:-}
      PF_ADMIN_RECOVERY_ANSWER: ${PF_ADMIN_RECOVERY_ANSWER:-}
      PF_SEED_SAMPLE_USER_PASSWORD: ${PF_SEED_SAMPLE_USER_PASSWORD:-}
      PF_FORCE_RESET_SAMPLE_PASSWORDS: ${PF_FORCE_RESET_SAMPLE_PASSWORDS:-false}
    volumes:
      - ./ops:/app/ops:ro
      - ./python_app:/app/python_app:ro
    command: ["python", "ops/bootstrap_auth.py"]

  smoke-test:
    build: *python-build
    image: *python-image
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_APP_USER:-pf_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
      MYSQL_DATABASE: Personal_Finance
      SMOKE_ADMIN_EMAIL: ${SMOKE_ADMIN_EMAIL}
      SMOKE_ADMIN_PASSWORD: ${SMOKE_ADMIN_PASSWORD}
      AUTH_DEV_MODE: ${AUTH_DEV_MODE:-false}
      AUTH_LOG_OTP_IN_DEV: ${AUTH_LOG_OTP_IN_DEV:-false}
    volumes:
      - ./python_app:/app/python_app:ro
    command: ["python", "python_app/smoke_test.py"]

volumes:
  mysql_data: